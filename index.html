<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study API Viewer</title>
    
    <!-- Using Marked.js to parse the markdown in your 'content' field -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-base: #0d1b2a;
            --bg-panel: #1b2a3a;
            --accent: #00e5b0;
            --text-main: #e0e0e0;
            --text-muted: #8892b0;
            --border-color: #00e5b055;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Structure */
        header {
            background-color: var(--bg-panel);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .aside-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--accent);
        }

        .aside-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background-color: var(--bg-base);
        }

        footer {
            background-color: var(--bg-panel);
            padding: 1rem 2rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--accent);
            min-height: 40px;
        }

        /* Typography & Elements */
        h1, h2, h3 { margin: 0 0 1rem 0; }
        h1 { font-size: 1.5rem; color: var(--accent); cursor: pointer; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 0.5rem; }
        
        a {
            color: var(--text-main);
            text-decoration: none;
            display: block;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }

        a:hover, a.active {
            background-color: var(--accent);
            color: var(--bg-base);
            font-weight: bold;
        }

        .note-container {
            max-width: 900px;
            line-height: 1.6;
        }

        .meta-tag {
            display: inline-block;
            background: #00e5b022;
            color: var(--accent);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            margin-right: 0.5rem;
        }

        /* Markdown Styles */
        .note-body h1, .note-body h2, .note-body h3 {
            color: var(--accent);
            margin-top: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3rem;
        }
        .note-body code {
            background: #000;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            color: #ff9e64;
        }
        .note-body pre code {
            display: block;
            padding: 1rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="navigateTo('/')">~/study_terminal</h1>
        <nav>
            <a href="/dbms" onclick="routeEvent(event)" style="display:inline; padding: 0 1rem;">/dbms</a>
            <a href="/java" onclick="routeEvent(event)" style="display:inline; padding: 0 1rem;">/java</a>
            <a href="/notes" onclick="routeEvent(event)" style="display:inline; padding: 0 1rem;">/all_notes</a>
        </nav>
    </header>

    <div class="container">
        <!-- Left Aside for Subject Contents -->
        <aside>
            <div class="aside-header">
                <h3 id="aside-title">Contents</h3>
            </div>
            <div class="aside-content">
                <ul id="content-list">
                    <li>Loading data...</li>
                </ul>
            </div>
        </aside>

        <!-- Main Display for Note Content -->
        <main>
            <div class="note-container" id="main-content">
                <h2>Select a subject or note</h2>
                <p>Use the navigation on the left to view data.</p>
            </div>
        </main>
    </div>

    <!-- Footer for Summary -->
    <footer>
        <strong>Summary:</strong> <span id="footer-summary">Awaiting selection...</span>
    </footer>

</body>
</html>
